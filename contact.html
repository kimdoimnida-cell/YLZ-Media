<!DOCTYPE html>
<html lang="ko">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css?v=20260222">

<body class="contact-page">

    <!-- Custom Cursor -->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>

    <!-- Navigation -->
    <nav class="nav" id="nav">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">
                <img src="images/logo.png" alt="YLZ MEDIA" class="logo-img">
            </a>
            <a href="index.html" class="nav-back">

        </div>
    </nav>

    <!-- Contact Page -->
    <main class="contact-page-main">
        <div class="container">

            <!-- 페이지 헤더 -->
            <div class="cp-header" style="text-align: center; padding-top: 10vh; padding-bottom: 15vh;">
                <span class="section-label reveal-up">Contact</span>
                <h1 class="cp-title reveal-up" data-delay="0.1" style="margin-bottom: 24px;">
                    프로젝트 문의하기
                </h1>
                <p class="cp-sub reveal-up" data-delay="0.2" style="margin-bottom: 48px;">
                    매월 신규 파트너 <em>3팀</em>만 선정합니다.<br>
                    자세한 프로젝트 내용과 원하시는 서비스를 작성해주시면,<br>
                    빠른 시일 내에 검토 후 연락드리겠습니다.
                </p>
                
                <div class="reveal-up" data-delay="0.3">
                    <a href="https://tally.so/r/wQQgO8" target="_blank" class="btn-primary" style="display: inline-flex; align-items: center; justify-content: center; padding: 18px 48px; border-radius: 100px; font-weight: 500; font-size: 1.1rem; color: #fff; background: var(--accent); transition: transform 0.3s ease, background 0.3s ease; text-decoration: none;">
                        <span>온라인 접수 양식 작성하기</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="margin-left: 8px;"><path d="M4 10H16M16 10L10 4M16 10L10 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </a>
                </div>
                
                <style>
                    .btn-primary:hover {
                        transform: translateY(-2px);
                        opacity: 0.9;
                    }
                </style>
            </div>

        </div>
    </main>

    <script src="js/contact.js"></script>

</html>
